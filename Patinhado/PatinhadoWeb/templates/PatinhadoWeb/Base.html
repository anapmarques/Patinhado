{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}Site{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{% static 'PatinhadoWeb/css/base.css' %}">

{% block extra_head %}{% endblock %}
</head>
<body>

<!-- ── HEADER ────────────────────────────────── -->
<header>
  <a href="{% url 'home' %}" class="logo">Logo</a>

  <nav>
      <a href="{% url 'about' %}"   {% if request.resolver_match.url_name == 'about'   %}class="active"{% endif %}>About Us</a>
      <a href="{% url 'list' %}"    {% if request.resolver_match.url_name == 'list'    %}class="active"{% endif %}>List</a>
      <a href="{% url 'give' %}"    {% if request.resolver_match.url_name == 'give'    %}class="active"{% endif %}>Give</a>
      <a href="{% url 'contact' %}" {% if request.resolver_match.url_name == 'contact' %}class="active"{% endif %}>Contact</a>
  </nav>

  <a href="{% if user.is_authenticated %}{% url 'profile' %}{% else %}{% url 'login' %}{% endif %}" class="header-user {% if request.resolver_match.url_name == 'profile' or request.resolver_match.url_name == 'login' %}active{% endif %}" aria-label="Perfil do usuário">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
  </a>
</header>

<!-- ── CONTEÚDO DA PÁGINA ─────────────────────── -->
{% block content %}{% endblock %}

<!-- ── FOOTER ─────────────────────────────────── -->
<footer>
  <div class="footer-logo">Logo</div>
  <div class="footer-links">
    <a href="{% url 'about' %}">About Us</a>
    <a href="{% url 'list' %}">List</a>
    <a href="{% url 'give' %}">Give</a>
    <a href="{% url 'contact' %}">Contact</a>
  </div>
  <div class="footer-copy">© 2026</div>
</footer>

{% block extra_scripts %}{% endblock %}
</body>
</html>
