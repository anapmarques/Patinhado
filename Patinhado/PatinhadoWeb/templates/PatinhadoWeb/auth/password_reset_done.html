{% extends "PatinhadoWeb/Base.html" %}
{% load static %}
{% block title %}Password Reset Sent{% endblock %}

{% block extra_head %}

{% endblock %}

{% block content %}
<div class="login-wrapper">

        <p class="register-link"><a href="{% url 'login' %}">Back to Login</a></p>
    </div>
</div>
{% endblock %}
