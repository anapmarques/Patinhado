{% extends 'PatinhadoWeb/Base.html' %}
{% block title %}Logout{% endblock %}
{% block content %}
    <h2>Logout Page</h2>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <p>Tem certeza que deseja sair?</p>
        <button type="submit">Sair</button>
        <a href="{% url 'home' %}">Cancelar</a>
    </form>
{% endblock %}
