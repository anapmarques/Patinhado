{% extends "PatinhadoWeb/Base.html" %}
{% load static %}
{% block title %}Change Password{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'PatinhadoWeb/css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h1>Change Password</h1>
        <p class="subtitle">Enter your new password</p>
        <form method="post">
            {% csrf_token %}
            <table class="formulario">
                {{ form.as_table }}
            </table>
            <input type="submit" value="Change Password" class="btn-submit">
        </form>
        <p class="register-link"><a href="{% url 'profile' %}">Back to Profile</a></p>
    </div>
</div>
{% endblock %}
