{% extends "PatinhadoWeb/Base.html" %}
{% load static %}
{% block title %}Sign In{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'PatinhadoWeb/css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h1>Sign In</h1>
        <p class="subtitle">Log in to continue</p>
        <form method="post">
            {% csrf_token %}
            <table class="formulario">
                {{ form.as_table }}
            </table>
            <input type="submit" value="Sign In" class="btn-submit">
        </form>
        <p class="register-link">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
    </div>
</div>
{% endblock %}
