<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil do Usuário</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #f5f2ee;
    --ink: #1a1714;
    --mid: #6b6560;
    --accent: #c0392b;
    --card-bg: #ffffff;
    --nav-h: 68px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER (idêntico ao principal) ───────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--nav-h);
    background: var(--bg);
    border-bottom: 1px solid rgba(26,23,20,.12);
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 40px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.35rem;
    letter-spacing: .04em;
    border: 1.5px solid var(--ink);
    padding: 4px 12px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  nav {
    flex: 1;
    display: flex;
    justify-content: center;
    gap: 44px;
  }

  nav a {
    text-decoration: none;
    color: var(--mid);
    font-size: .8rem;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    position: relative;
    padding-bottom: 2px;
    transition: color .2s;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: var(--accent);
    transition: width .25s ease;
  }

  nav a:hover { color: var(--ink); }
  nav a:hover::after { width: 100%; }

  .header-user {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .2s, color .2s;
    background: var(--ink);
    color: var(--bg);
  }

  .header-user svg { width: 16px; height: 16px; }

  /* ── MAIN ─────────────────────────────────── */
  main {
    flex: 1;
    padding: 52px 64px 80px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── PROFILE CARD ─────────────────────────── */
  .profile-card {
    display: flex;
    align-items: flex-start;
    gap: 44px;
    margin-bottom: 60px;
    animation: fadeUp .5s ease both;
  }

  /* Avatar */
  .avatar-wrap {
    flex-shrink: 0;
    position: relative;
  }

  .avatar {
    width: 148px;
    height: 148px;
    background: #e2dbd3;
    border: 1.5px solid rgba(26,23,20,.18);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .avatar svg {
    width: 72px;
    height: 72px;
    color: rgba(26,23,20,.3);
  }

  /* Info */
  .profile-info {
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .info-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .info-label {
    font-size: .7rem;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--mid);
    min-width: 90px;
  }

  .info-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--ink);
  }

  .info-value.placeholder {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dash {
    display: inline-block;
    height: 1.5px;
    background: var(--ink);
    border-radius: 1px;
  }

  .dash-long  { width: 60px; }
  .dash-mid   { width: 40px; }
  .dash-short { width: 28px; }
  .dash-xs    { width: 20px; }

  /* ── SECTION TITLE ───────────────────────── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: .02em;
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(26,23,20,.1);
    animation: fadeUp .5s .1s ease both;
  }

  /* ── HISTORY GRID ────────────────────────── */
  .history-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    animation: fadeUp .5s .18s ease both;
  }

  .history-card {
    width: 180px;
    background: var(--card-bg);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    cursor: pointer;
    transition: transform .28s ease, box-shadow .28s ease;
  }

  .history-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 28px rgba(0,0,0,.1);
  }

  .history-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: #e2dbd3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .history-img span {
    font-family: 'Playfair Display', serif;
    font-size: .65rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(26,23,20,.28);
  }

  .history-body {
    padding: 10px 12px 14px;
    border-top: 1px solid rgba(26,23,20,.06);
  }

  .history-title {
    font-size: .8rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 3px;
  }

  .history-meta {
    font-size: .7rem;
    color: var(--mid);
  }

  /* ── ACTIONS BAR ─────────────────────────── */
  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid rgba(26,23,20,.1);
    animation: fadeUp .5s .25s ease both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: .78rem;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    transition: background .2s, color .2s, border-color .2s;
  }

  .btn:hover {
    background: var(--ink);
    color: var(--bg);
  }

  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  .btn-delete {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-delete:hover {
    background: var(--accent);
    color: #fff;
  }

  /* ── FOOTER ──────────────────────────────── */
  footer {
    border-top: 1px solid rgba(26,23,20,.12);
    padding: 28px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo {
    font-family: 'Playfair Display', serif;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .footer-links {
    display: flex;
    gap: 28px;
  }

  .footer-links a {
    text-decoration: none;
    font-size: .72rem;
    color: var(--mid);
    letter-spacing: .1em;
    text-transform: uppercase;
    transition: color .2s;
  }

  .footer-links a:hover { color: var(--ink); }

  .footer-copy { font-size: .72rem; color: var(--mid); }

  /* ── ANIMATION ───────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ──────────────────────────── */
  @media (max-width: 700px) {
    main { padding: 36px 20px 60px; }
    .profile-card { flex-direction: column; gap: 24px; }
    nav { gap: 20px; }
    footer { padding: 24px 20px; flex-direction: column; gap: 16px; text-align: center; }
  }
</style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────── -->
<header>
  <div class="logo">Logo</div>

  <nav>
    <a href="index.html">About Us</a>
    <a href="index.html">List</a>
    <a href="#">Give</a>
    <a href="#">Contact</a>
  </nav>

  <div class="header-user" aria-label="User profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
  </div>
</header>

<!-- ── MAIN ──────────────────────────────────── -->
<main>

  <!-- Profile card -->
  <div class="profile-card">

    <div class="avatar-wrap">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
    </div>

    <div class="profile-info">
      <div class="info-row">
        <span class="info-label">Name</span>
        <span class="info-value placeholder">
          <span class="dash dash-mid"></span>
          <span class="dash dash-short"></span>
          <span class="dash dash-long"></span>
          <span class="dash dash-xs"></span>
        </span>
      </div>
      <div class="info-row">
        <span class="info-label">Age</span>
        <span class="info-value placeholder">
          <span class="dash dash-xs"></span>
          <span class="dash dash-xs"></span>
        </span>
      </div>
      <div class="info-row">
        <span class="info-label">Nationality</span>
        <span class="info-value placeholder">
          <span class="dash dash-mid"></span>
          <span class="dash dash-short"></span>
        </span>
      </div>
    </div>
  </div>

  <!-- Adoption History -->
  <h2 class="section-title">Adoption History</h2>

  <div class="history-grid">
    <div class="history-card">
      <div class="history-img"><span>img</span></div>
      <div class="history-body">
        <div class="history-title">Item Name</div>
        <div class="history-meta">Jan 2024</div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Edit
    </button>
    <button class="btn btn-delete">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Delete
    </button>
  </div>

</main>

<!-- ── FOOTER ─────────────────────────────────── -->
<footer>
  <div class="footer-logo">Logo</div>
  <div class="footer-links">
    <a href="#">About Us</a>
    <a href="#">List</a>
    <a href="#">Give</a>
    <a href="#">Contact</a>
  </div>
  <div class="footer-copy">© 2026</div>
</footer>

</body>
</html>
