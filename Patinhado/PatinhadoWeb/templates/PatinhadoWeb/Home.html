{% extends "PatinhadoWeb/Base.html" %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'PatinhadoWeb/css/home.css' %}">
{% endblock %}

{% block content %}
<!-- ── HERO ──────────────────────────────────── -->
<section class="hero">
  <div class="hero-placeholder">
    <span>img</span>
  </div>
</section>

<!-- fade-out gradient overlay (the "hatched" divider) -->
<div class="fade-divider"></div>

<!-- ── CATALOG ────────────────────────────────── -->
<section class="catalog">

  <!-- Filter bar -->
  <div class="filters">
    <input class="filter-search" type="text" placeholder="Search…" />
    <input class="filter-category" type="text" placeholder="Category" />
  </div>

  <!-- 4 × 2 card grid -->
  <div class="grid">
    {% for pet in pets %}
      {% include "PatinhadoWeb/pet/_pet_card.html" %}
    {% empty %}
      <div class="no-pets">
        <p>Nenhum pet disponível para adoção no momento.</p>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
